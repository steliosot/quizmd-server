substitutions:
  _SERVICE_NAME: quizmd-server
  _REGION: europe-west1
  _PLATFORM: managed

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - ${_PLATFORM}
      - --allow-unauthenticated
      - --port
      - '8080'
      - --min-instances
      - '1'
      - --max-instances
      - '1'
      - --timeout
      - '3600'
      - --set-env-vars
      - ROOM_MAX_PLAYERS=16,QUESTION_TIMEOUT_SECONDS=30,ROOM_TTL_MINUTES=30,HOST_REJOIN_SECONDS=60,COLLABORATE_MAX_RETRIES=3,COLLABORATE_DISCUSSION_SECONDS=40

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID
